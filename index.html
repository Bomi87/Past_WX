<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Past WX Search</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:24px;color:#243b53}
    .wrap{max-width:1180px;margin:0 auto}
    .card{background:#fff;border:1px solid #d9e2ec;border-radius:16px;padding:18px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    .grid > .field{min-width:0}
    .field label{display:block;font-size:13px;margin-bottom:6px;font-weight:700;color:#627d98}
    .field input{width:100%;min-width:0;height:42px;border:1px solid #d9e2ec;border-radius:10px;padding:0 12px;font-size:15px;box-sizing:border-box}

    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .actions button{flex:0 0 auto}
    button{border:0;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;min-width:105px;white-space:nowrap}

    @media (max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:700px){
      .actions{gap:6px}
      button{min-width:96px;padding:8px 10px;font-size:12px}
    }
    @media (max-width:560px){.grid{grid-template-columns:1fr}}
    .primary{background:#1565c0;color:#fff}
    .secondary{background:#eef4ff;color:#0d47a1}
    .status{margin-top:12px;padding:12px 14px;border-radius:10px;background:#eef3f8;display:none;white-space:pre-wrap}
    .ok{display:block;background:#edf7ee;color:#137333}
    .error{display:block;background:#fdeeee;color:#c62828}
    .warn{display:block;background:#fff6e5;color:#b26a00}
    .info{display:block}
    .table-wrap{overflow:auto;border:1px solid #d9e2ec;border-radius:12px}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{border-bottom:1px solid #d9e2ec;padding:10px 12px;text-align:left;font-size:14px;vertical-align:top}
    thead th{background:#f7fafc}
    .mono{font-family:Consolas,monospace}
    .meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;color:#627d98;font-size:13px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 style="margin:0 0 6px; font-size:22px;">✈️ 🌤️ Historical Airport Weather Analysis</h1>
    <div style="color:#627d98">시간대별 공항기상 분석</div>
  </div>

  <div class="card">
    <div class="grid">
      <div class="field">
        <label>AIRPORT</label>
        <input id="airport" maxlength="4" placeholder="RKSI">
      </div>
      <div class="field">
        <label>시작일자</label>
        <input id="startDate" type="date">
      </div>
      <div class="field">
        <label>종료일자</label>
        <input id="endDate" type="date">
      </div>
      <div class="field">
        <label>LOCAL 기준 조회시간</label>
        <input id="targetLocalTime" type="text" inputmode="numeric" placeholder="16:00" value="" onblur="formatTargetLocalTime()" onchange="formatTargetLocalTime()">
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="runSearch()">조회</button>
      <button class="secondary" onclick="clearResults()">초기화</button>
    </div>

    <div id="status" class="status info"></div>
  </div>

  <div class="card">
    <div class="meta" style="margin-bottom:12px;">
      <div>결과 건수: <strong id="rowCount">0</strong></div>
      <div>공항: <strong id="metaAirport">-</strong></div>
      <div>기준 LOCAL 시간: <strong id="metaLocalTime">-</strong></div>
      <div>기간: <strong id="metaPeriod">-</strong></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Date(UTC)</th>
            <th>UTC</th>
            <th>Report</th>
            <th>Visibility</th>
            <th>Wind</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr><td colspan="6" style="text-align:center;color:#627d98;">조회 결과가 없습니다.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzom8X8d2jKWhrjWrnZ1yaKrqUtR50gM3AV2YHIPv3PzYHVL8fTthAG0Tio5kMHS8yEYA/exec';

let currentRows = [];
let currentParams = {};
let jsonpSeq = 0;

function setStatus(message, type='info'){
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.style.display = 'block';
  el.textContent = message;
}

function formatTargetLocalTime(){
  const el = document.getElementById('targetLocalTime');
  if (!el.value.trim()) return;
  el.value = normalizeHour_(el.value);
}

function normalizeHour_(s) {
  s = String(s || '').trim();

  if (!s) return '16:00';

  if (/^\d{3}$/.test(s)) {
    const hh = '0' + s.slice(0, 1);
    const mm = s.slice(1, 3);
    if (Number(hh) <= 23 && Number(mm) <= 59) {
      return hh + ':' + mm;
    }
  }

  if (/^\d{4}$/.test(s)) {
    const hh = s.slice(0, 2);
    const mm = s.slice(2, 4);
    if (Number(hh) <= 23 && Number(mm) <= 59) {
      return hh + ':' + mm;
    }
  }

  if (/^\d{1,2}$/.test(s)) {
    const hh = ('0' + Number(s)).slice(-2);
    if (Number(hh) <= 23) {
      return hh + ':00';
    }
  }

  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (m) {
    const hh = ('0' + Number(m[1])).slice(-2);
    const mm = ('0' + Number(m[2])).slice(-2);
    if (Number(hh) <= 23 && Number(mm) <= 59) {
      return hh + ':' + mm;
    }
  }

  return '16:00';
}

function getParams(){
  return {
    airport: document.getElementById('airport').value.trim().toUpperCase(),
    startDate: document.getElementById('startDate').value,
    endDate: document.getElementById('endDate').value,
    targetLocalTime: document.getElementById('targetLocalTime').value
  };
}

function validate(p){
  if (!p.airport || p.airport.length !== 4) return '공항코드는 4자리 ICAO로 입력하세요.';
  if (!p.startDate) return '시작일자를 입력하세요.';
  if (!p.endDate) return '종료일자를 입력하세요.';
  if (!p.targetLocalTime) return 'LOCAL 기준 조회시간을 입력하세요.';
  if (p.startDate > p.endDate) return '시작일자가 종료일자보다 늦습니다.';
  return '';
}

function jsonpRequest(params){
  return new Promise((resolve, reject) => {
    const cb = '__jsonp_cb_' + (++jsonpSeq);
    const script = document.createElement('script');
    const qs = new URLSearchParams({...params, prefix: cb}).toString();

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('응답 시간 초과'));
    }, 30000);

    function cleanup(){
      clearTimeout(timer);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cb]; } catch(e) { window[cb] = undefined; }
    }

    window[cb] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('JSONP 로드 실패'));
    };

    script.src = GAS_WEBAPP_URL + '?' + qs;
    document.body.appendChild(script);
  });
}

function escapeHtml(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

/* =========================
   VISIBILITY
========================= */

function extractVisibilityMeters(report){
  const txt = String(report || '').toUpperCase();
  const values = [];

  if (/\bCAVOK\b/.test(txt)) values.push(9999);
  if (/\bP6SM\b/.test(txt)) values.push(9999);

  // 혼합분수: 1 1/2SM, 2 1/2SM
  const mixedFracMatches = txt.matchAll(/\b(\d+)\s+(\d+)\/(\d+)SM\b/g);
  for (const m of mixedFracMatches) {
    const whole = Number(m[1]);
    const num = Number(m[2]);
    const den = Number(m[3]);
    if (den > 0) values.push(Math.round((whole + num / den) * 1609.34));
  }

  // M1/4SM
  const lessThanFracMatches = txt.matchAll(/\bM(\d+)\/(\d+)SM\b/g);
  for (const m of lessThanFracMatches) {
    const num = Number(m[1]);
    const den = Number(m[2]);
    if (den > 0) values.push(Math.round((num / den) * 1609.34));
  }

  // 순수 분수: 1/2SM
  const fracMatches = txt.matchAll(/\b(\d+)\/(\d+)SM\b/g);
  for (const m of fracMatches) {
    const start = m.index ?? -1;
    if (start > 0) {
      const prevChar = txt[start - 1];
      if (/\d|M/.test(prevChar)) continue;
    }
    const num = Number(m[1]);
    const den = Number(m[2]);
    if (den > 0) values.push(Math.round((num / den) * 1609.34));
  }

  // 정수: 1SM, 2SM, 6SM
  const wholeMatches = txt.matchAll(/\b(\d+)SM\b/g);
  for (const m of wholeMatches) {
    const start = m.index ?? -1;
    if (start > 0) {
      const prevChunk = txt.slice(Math.max(0, start - 6), start);
      if (/\d+\s+\d+\/\d+\s*$/.test(prevChunk) || /\d\/\d\s*$/.test(prevChunk) || /M\s*$/.test(prevChunk)) continue;
    }
    values.push(Math.round(Number(m[1]) * 1609.34));
  }

  // RVR
  const rvrMatches = txt.matchAll(/\bR\d{2}[LRC]?\/P?(\d{4})[UDN]?\b/g);
  for (const m of rvrMatches) {
    values.push(Number(m[1]));
  }

  // prevailing visibility(미터형)
  const prevailingMatch = txt.match(
    /\b(?:METAR|SPECI)\s+[A-Z0-9]{4}\s+\d{6}Z\s+(?:\d{3}|VRB)\d{2,3}(?:G\d{2,3})?(?:KT|MPS)(?:\s+\d{3}V\d{3})?\s+(\d{4})\b/
  );
  if (prevailingMatch) {
    values.push(Number(prevailingMatch[1]));
  }

  if (!values.length) return '';
  return Math.min(...values);
}
/* =========================
   WIND
========================= */

function extractWindToken(report){
  const txt = String(report || '').toUpperCase();
  const m = txt.match(/\b(?:\d{3}|VRB)\d{2,3}(?:G\d{2,3})?(?:KT|MPS)\b/);
  return m ? m[0] : '';
}

function parseWindInfo(windToken){
  if (!windToken) {
    return {
      display: '',
      speedKt: null,
      gustKt: null,
      highlightBlue: false
    };
  }

  const s = String(windToken).toUpperCase().trim();
  const m = s.match(/^(\d{3}|VRB)(\d{2,3})(?:G(\d{2,3}))?(KT|MPS)$/);
  if (!m) {
    return {
      display: '',
      speedKt: null,
      gustKt: null,
      highlightBlue: false
    };
  }

  let speed = Number(m[2]);
  let gust = m[3] ? Number(m[3]) : null;
  const unit = m[4];

  let speedKt = speed;
  let gustKt = gust;

  // MPS → KT 환산
  if (unit === 'MPS') {
    speedKt = Math.round(speed * 1.94384);
    gustKt = gust != null ? Math.round(gust * 1.94384) : null;
  }

  const highlightBlue =
    speedKt >= 20 ||
    (gustKt != null && gustKt >= 25);

  return {
    display: gustKt != null ? `${speedKt}G${gustKt}kt` : `${speedKt}kt`,
    speedKt: speedKt,
    gustKt: gustKt,
    highlightBlue: highlightBlue
  };
}

function extractWindKt(report){
  const token = extractWindToken(report);
  const info = parseWindInfo(token);
  return info.speedKt == null ? '' : info.speedKt;
}

/* =========================
   COLOR
========================= */

function getCellColor(type, value){
  const v = Number(value);
  if (value === '' || isNaN(v)) return '';

  if (type === 'vis') {
    if (v <= 700) return '#f4cccc';
    if (v > 700 && v <= 1200) return '#fce5cd';
  }

  if (type === 'wind') {
    if (v >= 1) return '#cfe2f3';
  }

  return '';
}

/* =========================
   RENDER
========================= */

function renderRows(rows){
  document.getElementById('rowCount').textContent = rows.length;
  document.getElementById('metaAirport').textContent = currentParams.airport || '-';
  document.getElementById('metaLocalTime').textContent = currentParams.targetLocalTime || '-';
  document.getElementById('metaPeriod').textContent =
    currentParams.startDate ? `${currentParams.startDate} ~ ${currentParams.endDate}` : '-';

  const body = document.getElementById('resultBody');

  if (!rows.length){
    body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#627d98;">조회 결과가 없습니다.</td></tr>';
    return;
  }

  body.innerHTML = rows.map((r,i)=>{
    const visRaw = extractVisibilityMeters(r.report);

    const windToken = extractWindToken(r.report);
    const windInfo = parseWindInfo(windToken);

    const visColor = getCellColor('vis', visRaw);
    const windColor = windInfo.highlightBlue ? '#cfe2f3' : '';

    const vis = visRaw === '' ? '' : visRaw + 'm';
    const wind = windInfo.display || '';

    return `
      <tr>
        <td>${i+1}</td>
        <td style="white-space:nowrap;">${escapeHtml(r.utcDate || '')}</td>
        <td style="white-space:nowrap;">${escapeHtml(r.utcTime || '')}</td>
        <td class="mono">${escapeHtml(r.report || '')}</td>
        <td style="background:${visColor};">${escapeHtml(vis)}</td>
        <td style="background:${windColor};">${escapeHtml(wind)}</td>
      </tr>
    `;
  }).join('');
}

async function runSearch(){
  const p = getParams();
  const err = validate(p);
  if (err){ setStatus(err, 'error'); return; }

  currentParams = p;
  setStatus('조회 중...', 'info');

  try{
    const data = await jsonpRequest({ action:'search', ...p });
    if (!data.ok) throw new Error(data.message || '조회 실패');
    currentRows = Array.isArray(data.rows) ? data.rows : [];
    renderRows(currentRows);
    setStatus(`조회 완료: ${currentRows.length}건`, currentRows.length ? 'ok' : 'warn');
  }catch(e){
    setStatus('조회 실패: ' + e.message, 'error');
  }
}

async function saveToSheet(){
  const p = getParams();
  const err = validate(p);
  if (err){ setStatus(err, 'error'); return; }

  setStatus('시트 저장 중...', 'info');

  try{
    const data = await jsonpRequest({ action:'save', ...p });
    if (!data.ok) throw new Error(data.message || '시트 저장 실패');
    setStatus(data.message || '시트 저장 완료', 'ok');
  }catch(e){
    setStatus('시트 저장 실패: ' + e.message, 'error');
  }
}

async function loadSheetInputs(){
  setStatus('시트 입력값 불러오는 중...', 'info');

  try{
    const data = await jsonpRequest({ action:'sheetInputs' });
    if (!data.ok) throw new Error(data.message || '불러오기 실패');

    const p = data.params || {};
    if (p.airport) document.getElementById('airport').value = p.airport;
    if (p.startDate) document.getElementById('startDate').value = p.startDate;
    if (p.endDate) document.getElementById('endDate').value = p.endDate;
    if (p.targetLocalTime) document.getElementById('targetLocalTime').value = p.targetLocalTime;

    setStatus('시트 입력값을 불러왔습니다.', 'ok');
  }catch(e){
    setStatus('시트 입력값 불러오기 실패: ' + e.message, 'error');
  }
}

function clearResults(){
  currentRows = [];
  currentParams = {};
  renderRows([]);
  document.getElementById('metaAirport').textContent = '-';
  document.getElementById('metaLocalTime').textContent = '-';
  document.getElementById('metaPeriod').textContent = '-';
  setStatus('초기화되었습니다.', 'info');
}
</script>
</body>
</html>
