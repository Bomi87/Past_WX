<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <title>Past WX Search</title>
  <style>
    html{
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    *{
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f4f7fb;
      margin:0;
      padding:24px;
      color:#243b53;
    }

    .wrap{max-width:1180px;margin:0 auto}
    .card{background:#fff;border:1px solid #d9e2ec;border-radius:16px;padding:18px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    .grid > .field{min-width:0}

    .field label{
      display:block;
      font-size:13px;
      margin-bottom:6px;
      font-weight:700;
      color:#627d98;
    }

    .field input{
      width:100%;
      min-width:0;
      max-width:100%;
      height:42px;
      border:1px solid #d9e2ec;
      border-radius:10px;
      padding:0 12px;
      font-size:16px;
      box-sizing:border-box;
      appearance:none;
      -webkit-appearance:none;
      background:#fff;
    }

    .field input[type="date"]{
      width:100%;
      min-width:0;
      max-width:100%;
      box-sizing:border-box;
      appearance:none;
      -webkit-appearance:none;
    }

    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .actions button{flex:0 0 auto}

    button{
      border:0;
      border-radius:10px;
      padding:9px 12px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      min-width:105px;
      white-space:nowrap;
    }

    button:disabled{opacity:0.6;cursor:not-allowed}

    @media (max-width:900px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width:700px){
      .actions{gap:6px}
      button{min-width:96px;padding:8px 10px;font-size:12px}
    }

    @media (max-width:560px){
      .grid{grid-template-columns:1fr}
    }

    .primary{background:#1565c0;color:#fff}
    .secondary{background:#eef4ff;color:#0d47a1}

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:10px;
      background:#eef3f8;
      display:none;
      white-space:pre-wrap;
    }

    .ok{display:block;background:#edf7ee;color:#137333}
    .error{display:block;background:#fdeeee;color:#c62828}
    .warn{display:block;background:#fff6e5;color:#b26a00}
    .info{display:block}

    .table-wrap{
      overflow:auto;
      border:1px solid #d9e2ec;
      border-radius:12px;
      -webkit-overflow-scrolling:touch;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:980px;
    }

    th,td{
      border-bottom:1px solid #d9e2ec;
      padding:10px 12px;
      text-align:left;
      font-size:14px;
      vertical-align:top;
    }

    thead th{background:#f7fafc}

    .mono{
      font-family:Consolas,monospace;
      font-size:inherit;
      line-height:1.35;
      word-break:break-all;
      overflow-wrap:anywhere;
    }

    .meta{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      margin-top:8px;
      color:#627d98;
      font-size:13px;
    }

    .header-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .header-text{
      min-width:0;
    }

    .header-subtitle{
      margin-top:4px;
      color:#627d98;
      font-size:15px;
    }

    .header-icons{
      flex:0 0 auto;
      font-size:28px;
      line-height:1;
      white-space:nowrap;
    }

    @media (max-width:768px){
      #pdfBtn{
        display:none !important;
      }
    }

    @media (max-width:700px){
      .header-icons{
        font-size:24px;
      }
      .header-subtitle{
        font-size:14px;
      }
    }

    .result-modal{
      position:fixed;
      inset:0;
      background:rgba(36,59,83,0.38);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:14px;
    }

    .result-modal.open{display:flex}

    .result-modal-panel{
      width:min(1180px,100%);
      height:min(92vh,100%);
      background:#fff;
      border-radius:18px;
      border:1px solid #d9e2ec;
      box-shadow:0 16px 40px rgba(36,59,83,0.18);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .result-modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px;
      border-bottom:1px solid #d9e2ec;
      background:#f7fafc;
      flex:0 0 auto;
    }

    .result-modal-title{
      font-size:16px;
      font-weight:700;
      color:#243b53;
    }

    .result-modal-close{
      border:0;
      border-radius:10px;
      padding:8px 12px;
      background:#eef4ff;
      color:#0d47a1;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      min-width:auto;
    }

    .result-modal-body{
      flex:1;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      touch-action:pan-x pan-y;
      padding:14px;
      background:#fff;
    }

    .modal-meta{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:12px;
      color:#627d98;
      font-size:13px;
    }

    .modal-table-wrap{
      overflow:auto;
      border:1px solid #d9e2ec;
      border-radius:12px;
      -webkit-overflow-scrolling:touch;
    }

    .modal-zoom{
      transform:none;
      width:auto;
    }

    @media (max-width:700px){
      body{
        padding:12px;
      }

      .card{
        padding:14px;
        border-radius:14px;
      }

      .result-modal{
        padding:0;
        align-items:stretch;
        justify-content:stretch;
      }

      .result-modal-panel{
        width:100vw;
        height:100dvh;
        border-radius:0;
        border:none;
        box-shadow:none;
      }

      .result-modal-header{
        position:sticky;
        top:0;
        z-index:20;
        padding:12px 14px;
      }

      .result-modal-title{
        font-size:15px;
      }

      .result-modal-close{
        padding:10px 12px;
        font-size:14px;
      }

      .result-modal-body{
        padding:10px;
      }

      .modal-meta{
        gap:10px;
        font-size:12px;
      }

      .modal-zoom{
        transform:none;
        width:auto;
      }

      .modal-zoom table{
        min-width:820px;
      }

      .modal-zoom th,
      .modal-zoom td{
        font-size:12px;
        padding:6px 8px;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card header-card">
    <div class="header-top">
      <div class="header-text">
        <h1 style="margin:0; font-size:22px;">Historical Airport Weather Analysis</h1>
        <div class="header-subtitle">시간대별 공항기상 분석</div>
      </div>
      <div class="header-icons">✈️ 🌤️</div>
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div class="field">
        <label>AIRPORT</label>
        <input id="airport" maxlength="4" placeholder="RKSI" style="text-transform: uppercase;" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field">
        <label>시작일자</label>
      <input id="startDate" type="date" onfocus="presetStartDateIfEmpty()" onchange="handleStartDateChange()">
      </div>
      <div class="field">
        <label>종료일자</label>
        <input id="endDate" type="date" onclick="presetEndDateIfEmpty()" onfocus="presetEndDateIfEmpty()">
      </div>
      <div class="field">
        <label>LOCAL 기준 조회시간</label>
        <input id="targetLocalTime" type="text" inputmode="numeric" placeholder="16:00" value="" onblur="formatTargetLocalTime()" onchange="formatTargetLocalTime()">
      </div>
    </div>

    <div class="actions">
      <button id="searchBtn" class="primary" onclick="runSearch()">조회</button>
      <button class="secondary" onclick="clearResults()">초기화</button>
      <button id="pdfBtn" class="secondary" onclick="exportResultPdf()" disabled>PDF 저장</button>
    </div>

    <div id="status" class="status info"></div>
  </div>

  <div class="card">
    <div class="meta" style="margin-bottom:12px;">
      <div>결과 건수: <strong id="rowCount">0</strong></div>
      <div>공항: <strong id="metaAirport">-</strong></div>
      <div>기준 LOCAL 시간: <strong id="metaLocalTime">-</strong></div>
      <div>기간: <strong id="metaPeriod">-</strong></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Date(UTC)</th>
            <th>UTC</th>
            <th>Report</th>
            <th>Phenomena</th>
            <th>Visibility</th>
            <th>Wind</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr><td colspan="7" style="text-align:center;color:#627d98;">조회 결과가 없습니다.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="resultModal" class="result-modal" onclick="handleModalBackdrop(event)">
  <div class="result-modal-panel">
    <div class="result-modal-header">
      <div class="result-modal-title">조회 결과</div>
      <button class="result-modal-close" onclick="closeResultModal()">닫기</button>
    </div>
    <div class="result-modal-body">
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-zoom">
        <div class="modal-table-wrap">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Date(UTC)</th>
                <th>UTC</th>
                <th>Report</th>
                <th>Phenomena</th>
                <th>Visibility</th>
                <th>Wind</th>
              </tr>
            </thead>
            <tbody id="modalResultBody">
              <tr><td colspan="7" style="text-align:center;color:#627d98;">조회 결과가 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxe-zKcDq63h4imWUe-YCVB2r1v5M4jkO_w6OzycbJJ0MBmKDfBMCkQHE4chmp1bvuJeA/exec';
const WX_HIGHLIGHT_CODES = ['TS','GR','GS','FZ','FG','SN','FC','VA','SG','PL','SS','DS','SQ'];

let currentRows = [];
let currentParams = {};
let jsonpSeq = 0;

function hasHighlightedWeather(wxText){
  const s = String(wxText || '').toUpperCase();
  if (!s) return false;
  return s.indexOf('+') > -1 || WX_HIGHLIGHT_CODES.some(code => s.indexOf(code) > -1);
}

function setStatus(message, type='info'){
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.style.display = 'block';
  el.textContent = message;
}

function isMobileDevice(){
  return window.innerWidth <= 768;
}

function updatePdfButton(){
  const btn = document.getElementById('pdfBtn');
  if (!btn) return;
  if (isMobileDevice()) {
    btn.disabled = true;
    return;
  }
  btn.disabled = !currentRows.length;
}

function formatTargetLocalTime(){
  const el = document.getElementById('targetLocalTime');
  if (!el.value.trim()) return;
  el.value = normalizeHour_(el.value);
}

function normalizeHour_(s) {
  s = String(s || '').trim();

  if (!s) return '16:00';

  if (/^\d{3}$/.test(s)) {
    const hh = '0' + s.slice(0, 1);
    const mm = s.slice(1, 3);
    if (Number(hh) <= 23 && Number(mm) <= 59) return hh + ':' + mm;
  }

  if (/^\d{4}$/.test(s)) {
    const hh = s.slice(0, 2);
    const mm = s.slice(2, 4);
    if (Number(hh) <= 23 && Number(mm) <= 59) return hh + ':' + mm;
  }

  if (/^\d{1,2}$/.test(s)) {
    const hh = ('0' + Number(s)).slice(-2);
    if (Number(hh) <= 23) return hh + ':00';
  }

  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (m) {
    const hh = ('0' + Number(m[1])).slice(-2);
    const mm = ('0' + Number(m[2])).slice(-2);
    if (Number(hh) <= 23 && Number(mm) <= 59) return hh + ':' + mm;
  }

  return '16:00';
}

function formatDateToYYYYMMDD(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function addDaysToDateString(dateStr, days){
  const dt = new Date(dateStr + 'T00:00:00');
  dt.setDate(dt.getDate() + days);
  return formatDateToYYYYMMDD(dt);
}
function presetStartDateIfEmpty(){
  const startEl = document.getElementById('startDate');
  if (!startEl) return;

  if (!startEl.value) {
    const today = new Date();
    today.setDate(today.getDate() - 30);
    startEl.value = formatDateToYYYYMMDD(today);

    handleStartDateChange();
  }
}
function handleStartDateChange(){
  const startEl = document.getElementById('startDate');
  const endEl = document.getElementById('endDate');

  if (!startEl.value) return;

  const defaultEnd = addDaysToDateString(startEl.value, 30);
  endEl.value = defaultEnd;
  endEl.min = startEl.value;
}

function presetEndDateIfEmpty(){
  const startEl = document.getElementById('startDate');
  const endEl = document.getElementById('endDate');

  if (!startEl.value) return;

  endEl.min = startEl.value;

  if (!endEl.value) {
    endEl.value = addDaysToDateString(startEl.value, 30);
  }
}

function getParams(){
  return {
    airport: document.getElementById('airport').value.trim().toUpperCase(),
    startDate: document.getElementById('startDate').value,
    endDate: document.getElementById('endDate').value,
    targetLocalTime: document.getElementById('targetLocalTime').value
  };
}

function validate(p){
  if (!p.airport || p.airport.length !== 4) return '공항코드는 4자리 ICAO로 입력하세요.';
  if (!p.startDate) return '시작일자를 입력하세요.';
  if (!p.endDate) return '종료일자를 입력하세요.';
  if (!p.targetLocalTime) return 'LOCAL 기준 조회시간을 입력하세요.';
  if (p.startDate > p.endDate) return '시작일자가 종료일자보다 늦습니다.';
  return '';
}

function jsonpRequest(params){
  return new Promise((resolve, reject) => {
    const cb = '__jsonp_cb_' + (++jsonpSeq);
    const script = document.createElement('script');
    const qs = new URLSearchParams({...params, prefix: cb}).toString();

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('응답 시간 초과'));
    }, 120000);

    function cleanup(){
      clearTimeout(timer);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cb]; } catch(e) { window[cb] = undefined; }
    }

    window[cb] = function(data){
      cleanup();
      resolve(data);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('JSONP 로드 실패'));
    };

    script.src = GAS_WEBAPP_URL + '?' + qs;
    document.body.appendChild(script);
  });
}

function escapeHtml(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

function getCellColor(type, value){
  const v = Number(value);
  if (value === '' || isNaN(v)) return '';

  if (type === 'vis') {
    if (v <= 700) return '#f4cccc';
    if (v > 700 && v <= 1200) return '#fce5cd';
  }

  return '';
}

function buildRowsHtml(rows){
  if (!rows.length){
    return '<tr><td colspan="7" style="text-align:center;color:#627d98;">조회 결과가 없습니다.</td></tr>';
  }

  return rows.map((r,i)=>{
    const wx = r.phenomena || '';
    const wxColor = hasHighlightedWeather(wx) ? '#f4cccc' : '';

    const visRaw = (r.visibilityMeters ?? '') !== '' ? r.visibilityMeters : '';
    const visColor = getCellColor('vis', visRaw);
    const vis = visRaw === '' ? '' : visRaw + 'm';

    const wind = r.windDisplay || '';
    const windColor = r.windBlue ? '#cfe2f3' : '';

    return `
      <tr>
        <td>${i+1}</td>
        <td style="white-space:nowrap;">${escapeHtml(r.utcDate || '')}</td>
        <td style="white-space:nowrap;">${escapeHtml(r.utcTime || '')}</td>
        <td class="mono">${escapeHtml(r.report || '')}</td>
        <td style="background:${wxColor};">${escapeHtml(wx)}</td>
        <td style="background:${visColor};">${escapeHtml(vis)}</td>
        <td style="background:${windColor};">${escapeHtml(wind)}</td>
      </tr>
    `;
  }).join('');
}

function renderRows(rows){
  document.getElementById('rowCount').textContent = rows.length;
  document.getElementById('metaAirport').textContent = currentParams.airport || '-';
  document.getElementById('metaLocalTime').textContent = currentParams.targetLocalTime || '-';
  document.getElementById('metaPeriod').textContent =
    currentParams.startDate ? `${currentParams.startDate} ~ ${currentParams.endDate}` : '-';

  const html = buildRowsHtml(rows);
  document.getElementById('resultBody').innerHTML = html;
  document.getElementById('modalResultBody').innerHTML = html;

  document.getElementById('modalMeta').innerHTML = `
    <div>결과 건수: <strong>${rows.length}</strong></div>
    <div>공항: <strong>${escapeHtml(currentParams.airport || '-')}</strong></div>
    <div>기준 LOCAL 시간: <strong>${escapeHtml(currentParams.targetLocalTime || '-')}</strong></div>
    <div>기간: <strong>${escapeHtml(currentParams.startDate ? `${currentParams.startDate} ~ ${currentParams.endDate}` : '-')}</strong></div>
  `;

  updatePdfButton();
}

function openResultModal(){
  const modal = document.getElementById('resultModal');
  const body = modal.querySelector('.result-modal-body');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (body) {
    body.scrollTop = 0;
    body.scrollLeft = 0;
  }

  const active = document.activeElement;
  if (active) active.blur();
}


function closeResultModal(){
  const modal = document.getElementById('resultModal');
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

function handleModalBackdrop(event){
  if (event.target.id === 'resultModal') {
    closeResultModal();
  }
}

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeResultModal();
});

window.addEventListener('resize', updatePdfButton);

async function runSearch(){
  const btn = document.getElementById('searchBtn');
  if (btn) btn.disabled = true;

  const p = getParams();
  const err = validate(p);
  if (err){
    setStatus(err, 'error');
    if (btn) btn.disabled = false;
    return;
  }

  currentParams = p;
  setStatus('조회 중...', 'info');

  try{
    const data = await jsonpRequest({ action:'search', ...p });
    if (!data.ok) throw new Error(data.message || '조회 실패');

    currentRows = Array.isArray(data.rows) ? data.rows : [];
    renderRows(currentRows);
    setStatus(`조회 완료: ${currentRows.length}건`, currentRows.length ? 'ok' : 'warn');

    if (currentRows.length && window.innerWidth <= 768) {
      openResultModal();
    }
  }catch(e){
    setStatus('조회 실패: ' + e.message, 'error');
  }finally{
    if (btn) btn.disabled = false;
  }
}

function clearResults(){
  currentRows = [];
  currentParams = {};
  renderRows([]);

  document.getElementById('airport').value = '';
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
  document.getElementById('endDate').min = '';
  document.getElementById('targetLocalTime').value = '';

  document.getElementById('metaAirport').textContent = '-';
  document.getElementById('metaLocalTime').textContent = '-';
  document.getElementById('metaPeriod').textContent = '-';
  setStatus('초기화되었습니다.', 'info');
  closeResultModal();
}

function exportResultPdf(){
  if (isMobileDevice()) return;

  if (!currentRows.length) {
    setStatus('먼저 조회 결과를 생성하세요.', 'warn');
    return;
  }

  const title = `Historical_WX_${currentParams.airport || 'AIRPORT'}_${currentParams.startDate || ''}_${currentParams.endDate || ''}`;
  const rowsHtml = buildRowsHtml(currentRows);

  const printHtml = `
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>${escapeHtml(title)}</title>
<style>
  @page { size: A4 landscape; margin: 12mm; }

  *{
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    box-sizing:border-box;
  }

  html, body{
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body{
    font-family: Arial, sans-serif;
    color:#243b53;
    margin:0;
    padding:0;
  }
  .head{
    margin-bottom:12px;
  }
  .title{
    font-size:20px;
    font-weight:700;
    margin-bottom:6px;
  }
  .meta{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    font-size:12px;
    color:#486581;
    margin-bottom:12px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
  }
  th, td{
    border:1px solid #d9e2ec;
    padding:6px 8px;
    font-size:11px;
    vertical-align:top;
    word-break:break-word;
  }
  th{
    background:#f7fafc;
  }
  .mono{
    font-family: Consolas, monospace;
    font-size:10px;
  }
</style>
</head>
<body>
  <div class="head">
    <div class="title">Historical Airport Weather Analysis</div>
